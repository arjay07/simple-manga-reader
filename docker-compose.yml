services:
  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - manga-reader
    restart: unless-stopped

  manga-reader:
    build: .
    expose:
      - "3000"
    volumes:
      - ${MANGA_DIR_HOST:?Set MANGA_DIR_HOST in .env to your manga folder path}:/manga
      - manga-data:/app/data
      - manga-covers:/app/public/covers
    environment:
      - MANGA_DIR=/manga
      - DATABASE_PATH=data/manga-reader.db
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
    restart: unless-stopped

volumes:
  manga-data:
  manga-covers:
  caddy-data:
  caddy-config:
