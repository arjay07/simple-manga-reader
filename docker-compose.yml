services:
  manga-reader:
    build: .
    ports:
      - "${PORT:-3000}:3000"
    volumes:
      - ${MANGA_DIR_HOST:?Set MANGA_DIR_HOST in .env to your manga folder path}:/manga
      - manga-data:/app/data
      - manga-covers:/app/public/covers
    environment:
      - MANGA_DIR=/manga
      - DATABASE_PATH=data/manga-reader.db
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
    restart: unless-stopped

volumes:
  manga-data:
  manga-covers:
