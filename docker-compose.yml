services:
  caddy:
    build:
      context: .
      dockerfile: Dockerfile.caddy
      args:
        DNS_PLUGIN: ${DNS_PLUGIN:-github.com/caddy-dns/duckdns}
    ports:
      - "8080:80"
      - "8443:443"
    volumes:
      - caddy-data:/data
      - caddy-config:/config
    environment:
      - DNS_TOKEN=${DNS_TOKEN:?Set DNS_TOKEN in .env}
      - DNS_PROVIDER=${DNS_PROVIDER:-duckdns}
      - PRIMARY_DOMAIN=${PRIMARY_DOMAIN:?Set PRIMARY_DOMAIN in .env}
      - SECONDARY_DOMAIN=${SECONDARY_DOMAIN:-}
    depends_on:
      - manga-reader
    restart: unless-stopped

  manga-reader:
    build:
      context: .
      args:
        NEXT_PUBLIC_BASE_PATH: ${NEXT_PUBLIC_BASE_PATH:-}
    ports:
      - "${PORT:-3000}:3000"
    volumes:
      - ${MANGA_DIR_HOST:?Set MANGA_DIR_HOST in .env to your manga folder path}:/manga
      - manga-data:/app/data
      - manga-covers:/app/public/covers
    environment:
      - MANGA_DIR=/manga
      - DATABASE_PATH=data/manga-reader.db
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
    restart: unless-stopped

volumes:
  manga-data:
  manga-covers:
  caddy-data:
  caddy-config:
